name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: cp .env.example .env
      - run: uv sync --extra dev
      - run: bash scripts/lint.sh

  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: cp .env.example .env
      - run: uv sync --extra dev
      - run: uv run mypy backend/

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: cp .env.example .env
      - run: uv sync --extra dev
      - run: bash scripts/test.sh

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: jobhunting_test
          POSTGRES_USER: jobuser
          POSTGRES_PASSWORD: jobpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: cp .env.example .env
      - run: uv sync --extra dev
      - run: uv run pytest -v -m db -o "addopts=-v --tb=short"
        env:
          DATABASE_URL: postgresql+asyncpg://jobuser:jobpass@localhost:5432/jobhunting_test
          REDIS_URL: redis://localhost:6379/0
