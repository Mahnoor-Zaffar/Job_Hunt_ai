# Pre-configured companies for the ATS scanner.
# Adding a company requires NO code changes — just add an entry below.
#
# Fields:
#   name:         Display name of the company
#   platform:     ATS platform — greenhouse, lever, ashby, workable, or custom
#   careers_url:  Base URL for the company's public job board or API endpoint
#   api_key:      Required for Ashby
#   skip:         Set to true to pause scraping for this company
#   archetype:    Company category (AI_Labs, Voice_AI, AI_Platforms, etc.)

